name: "今日热榜小组件"
description: "显示来自 rebang.today 的全站热榜数据，支持多尺寸布局。抓取全站（top）最新（lasthour）热榜，支持点击跳转原文。"
author: "Egern Assistant"
scriptings:
  - generic:
      name: "rebang-widget"
      # 请将此处 URL 替换为您的 JS 文件实际托管地址
      script_url: "https://raw.githubusercontent.com/icelawl/LoonKissSurge/refs/heads/main/Egern/Widget/rebang.js"
      timeout: 20
widgets:
  - name: "rebang-widget"
    script_name: "rebang-widget"
    env:
      TAB: "top"
      SUB_TAB: "lasthour"