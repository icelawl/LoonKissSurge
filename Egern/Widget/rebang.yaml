# Egern Rebang.Today Widget Module
# Includes script definitions and example widgets for various platforms.

name: "今日热榜 Rebang.Today (Deep Fix)"
description: "显示 rebang.today 的各平台热榜数据（知乎、微博、小红书、36氪、哔哩哔哩、GitHub、少数派等）"
author: "Aime"
version: "2.0.0"

# 1. 脚本定义
scriptings:
  - generic:
      name: "rebang-today-script"
      script_url: "https://raw.githubusercontent.com/icelawl/LoonKissSurge/refs/heads/main/Egern/Widget/rebang.js"
      timeout: 15

# 2. 小组件配置示例
# 可以在 Egern 的小组件管理页面中添加以下配置，并通过 env.tab 参数切换不同平台。
widgets:
  # 推荐将以下内容复制并修改相应的 env.tab 参数
  - name: "今日热榜 - 知乎"
    script_name: "rebang-today-script"
    env:
      tab: "zhihu"

  - name: "今日热榜 - 微博热搜"
    script_name: "rebang-today-script"
    env:
      tab: "weibo"

  - name: "今日热榜 - 小红书热点"
    script_name: "rebang-today-script"
    env:
      tab: "xiaohongshu"

  - name: "今日热榜 - 36氪热榜"
    script_name: "rebang-today-script"
    env:
      tab: "36kr"

  - name: "今日热榜 - 哔哩哔哩"
    script_name: "rebang-today-script"
    env:
      tab: "bilibili"

  - name: "今日热榜 - GitHub Trending"
    script_name: "rebang-today-script"
    env:
      tab: "github"

  - name: "今日热榜 - 百度热搜"
    script_name: "rebang-today-script"
    env:
      tab: "baidu"

  - name: "今日热榜 - 少数派"
    script_name: "rebang-today-script"
    env:
      tab: "sspai"

  - name: "今日热榜 - 今日头条"
    script_name: "rebang-today-script"
    env:
      tab: "toutiao"

  - name: "今日热榜 - 全站总榜"
    script_name: "rebang-today-script"
    env:
      tab: "top"