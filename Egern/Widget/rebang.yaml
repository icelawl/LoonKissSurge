# Egern Rebang.Today Widget Module
# 包含脚本配置和示例小组件定义

name: "今日热榜 Rebang.Today"
description: "显示 rebang.today 的各平台热榜数据"
author: "Aime"

# 1. 脚本定义
scriptings:
  - generic:
      name: "rebang-today-script"
      script_url: "https://raw.githubusercontent.com/icelawl/LoonKissSurge/refs/heads/main/Egern/Widget/rebang.js" # 请替换为实际部署的脚本 URL，或在 Egern 中创建本地脚本
      timeout: 20

# 2. 小组件定义示例
widgets:
  # 知乎热榜
  - name: "今日热榜 - 知乎"
    script_name: "rebang-today-script"
    env:
      tab: "zhihu"

  # 微博热榜
  - name: "今日热榜 - 微博"
    script_name: "rebang-today-script"
    env:
      tab: "weibo"

  # 小红书热榜
  - name: "今日热榜 - 小红书"
    script_name: "rebang-today-script"
    env:
      tab: "xiaohongshu"

  # 36氪热榜
  - name: "今日热榜 - 36氪"
    script_name: "rebang-today-script"
    env:
      tab: "36kr"

  # 少数派热榜
  - name: "今日热榜 - 少数派"
    script_name: "rebang-today-script"
    env:
      tab: "sspai"

  # 哔哩哔哩热榜
  - name: "今日热榜 - 哔哩哔哩"
    script_name: "rebang-today-script"
    env:
      tab: "bilibili"