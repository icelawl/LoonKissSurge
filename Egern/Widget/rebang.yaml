name: "今日热榜 Rebang.Today"
description: "显示 rebang.today 的各平台热榜数据（小红书、36氪、少数派等）"
author: "Aime"
version: "2.0.0"

scriptings:
  - generic:
      name: "rebang-today-script"
      script_url: "https://raw.githubusercontent.com/icelawl/LoonKissSurge/refs/heads/main/Egern/Widget/rebang.js"
      timeout: 15

widgets:

  - name: "xiaohongshu"
    script_name: "rebang-today-script"
    env:
      tab: "xiaohongshu"

  - name: "36kr"
    script_name: "rebang-today-script"
    env:
      tab: "36kr"

  - name: "sspai"
    script_name: "rebang-today-script"
    env:
      tab: "sspai"

  - name: "toutiao"
    script_name: "rebang-today-script"
    env:
      tab: "toutiao"

  - name: "top"
    script_name: "rebang-today-script"
    env:
      tab: "top"